<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Subject</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <header class="app-header">
    <h1>BSc Notes</h1>
  </header>

  <main class="container" style="padding:1.5rem;">
    <div class="glass-card">
      <h2 data-sub=""></h2>
      <div class="grid grid-cols-3">
        <a href="unit.html?sem=1&sub=physics&unit=1" class="btn">Unit 1</a>
        <a href="unit.html?sem=1&sub=physics&unit=2" class="btn">Unit 2</a>
        <a href="unit.html?sem=1&sub=physics&unit=3" class="btn">Unit 3</a>
        <a href="unit.html?sem=1&sub=physics&unit=4" class="btn">Unit 4</a>
        <a href="unit.html?sem=1&sub=physics&unit=5" class="btn">Unit 5</a>
      </div>
    </div>
  </main>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const sem = urlParams.get("sem") || "1";
    const sub = urlParams.get("sub") || "physics";

    document.querySelector("[data-sub]").textContent = sub.charAt(0).toUpperCase() + sub.slice(1);
  </script>
</body>
</html>
